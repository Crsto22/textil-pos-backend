# Docker Compose para PRODUCCIÓN
# Úsalo con: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.9'

services:
  mysql:
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD requerido}
    volumes:
      - mysql_data_prod:/var/lib/mysql
    # Sin puerto expuesto públicamente
    expose:
      - "3306"

  app:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_SERVLET_CONTEXT_PATH: /api
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-Lax}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS requerido}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      ASISTENCIA_ADMS_MAX_EVENTS: ${ASISTENCIA_ADMS_MAX_EVENTS:-1000}
      ASISTENCIA_ADMS_MAX_PAST_DAYS: ${ASISTENCIA_ADMS_MAX_PAST_DAYS:-7}
      ASISTENCIA_ADMS_MAX_FUTURE_MINUTES: ${ASISTENCIA_ADMS_MAX_FUTURE_MINUTES:-10}
      ASISTENCIA_ADMS_MAX_BODY_BYTES: ${ASISTENCIA_ADMS_MAX_BODY_BYTES:-262144}
      ASISTENCIA_DUPLICADO_SEGUNDOS: ${ASISTENCIA_DUPLICADO_SEGUNDOS:-120}
    # Puerto interno, usa reverse proxy en frente
    expose:
      - "8080"
    volumes:
      - app_storage_prod:/app/storage
      - app_logs_prod:/app/logs
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

volumes:
  mysql_data_prod:
    driver: local
  app_storage_prod:
    driver: local
  app_logs_prod:
    driver: local
