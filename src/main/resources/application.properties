#Perfil activo
spring.profiles.active=prod
spring.config.import=optional:file:.env[.properties]

# Nombre de la aplicación
spring.application.name=sistematextil

# Puerto del servidor
server.port=8080

# Configuración de Base de Datos Local (MySQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CONFIGURACIÓN JWT
application.jwt.secret-key=${JWT_SECRET}
application.jwt.token-prefix=Bearer
application.jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}
application.jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}

# CONFIGURACIÓN PAGINACIÓN
application.pagination.default-size=10

# CONFIGURACIÓN COOKIE (refresh token)
application.jwt.cookie-secure=${COOKIE_SECURE:true}
application.jwt.cookie-domain=${COOKIE_DOMAIN:}
application.jwt.cookie-same-site=${COOKIE_SAME_SITE:Lax}

# CONFIGURACIÓN CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
cors.max-age=${CORS_MAX_AGE:3600}

# Actuator: solo health en produccion
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never


#AWS (variables de entorno / .env)
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:sistema-textil-cris-2026}
aws.s3.sunat.bucket=${AWS_S3_SUNAT_BUCKET:}

# Almacenamiento local
storage.base-path=${STORAGE_BASE_PATH:storage}

# Multipart uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Facturacion electronica SUNAT
sunat.mode=${SUNAT_MODE:disabled}
sunat.cert-base-path=${SUNAT_CERT_BASE_PATH:${STORAGE_BASE_PATH:storage}/sunat/certificados}
sunat.cert-max-file-size-mb=${SUNAT_CERT_MAX_FILE_SIZE_MB:5}
sunat.crypto-key=${SUNAT_CRYPTO_KEY:}
sunat.job.fixed-delay-ms=${SUNAT_JOB_FIXED_DELAY_MS:15000}
sunat.job.batch-size=${SUNAT_JOB_BATCH_SIZE:10}
sunat.job.max-retries=${SUNAT_JOB_MAX_RETRIES:10}
sunat.job.lock-minutes=${SUNAT_JOB_LOCK_MINUTES:10}

# Dashboard sistema: verificacion de disponibilidad SUNAT
dashboard.sunat.health-timeout-ms=${DASHBOARD_SUNAT_HEALTH_TIMEOUT_MS:5000}
dashboard.sunat.health-cache-ttl-seconds=${DASHBOARD_SUNAT_HEALTH_CACHE_TTL_SECONDS:60}

# Consulta de documentos SUNAT
external.sunat-consulta.base-url=${SUNAT_CONSULTA_BASE_URL:https://ww1.sunat.gob.pe/ol-ti-itfisdenreg/itfisdenreg.htm}

# Brevo correos transaccionales ecommerce
brevo.enabled=${BREVO_ENABLED:false}
brevo.api-key=${BREVO_API_KEY:}
brevo.sender-email=${BREVO_SENDER_EMAIL:}
brevo.sender-name=${BREVO_SENDER_NAME:KIMENTS}
brevo.reply-to-email=${BREVO_REPLY_TO_EMAIL:}
ecommerce.frontend-url=${ECOMMERCE_FRONTEND_URL:http://localhost:3000}

# Cloudflare Turnstile checkout
turnstile.enabled=${TURNSTILE_ENABLED:false}
turnstile.secret-key=${TURNSTILE_SECRET_KEY:}
turnstile.siteverify-url=${TURNSTILE_SITEVERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}
