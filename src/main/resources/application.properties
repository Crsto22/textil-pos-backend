#Perfil activo
spring.profiles.active=prod
spring.config.import=optional:file:.env[.properties]

# Nombre de la aplicación
spring.application.name=sistematextil

# Puerto del servidor
server.port=8080

# Configuración de Base de Datos Local (MySQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CONFIGURACIÓN JWT
application.jwt.secret-key=${JWT_SECRET}
application.jwt.token-prefix=Bearer
application.jwt.access-token-expiration-minutes=120
application.jwt.refresh-token-expiration-days=7

# CONFIGURACIÓN PAGINACIÓN
application.pagination.default-size=10

# CONFIGURACIÓN COOKIE (refresh token)
application.jwt.cookie-secure=false
application.jwt.cookie-domain=

# CONFIGURACIÓN CORS
cors.allowed-origins=*
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.max-age=3600


#AWS (variables de entorno / .env)
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:sistema-textil-cris-2026}
aws.s3.sunat.bucket=${AWS_S3_SUNAT_BUCKET:}

# Almacenamiento local
storage.base-path=${STORAGE_BASE_PATH:storage}

# Multipart uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Facturacion electronica SUNAT
sunat.mode=${SUNAT_MODE:disabled}
sunat.cert-base-path=${SUNAT_CERT_BASE_PATH:${STORAGE_BASE_PATH:storage}/sunat/certificados}
sunat.cert-max-file-size-mb=${SUNAT_CERT_MAX_FILE_SIZE_MB:5}
sunat.crypto-key=${SUNAT_CRYPTO_KEY:}
sunat.job.fixed-delay-ms=${SUNAT_JOB_FIXED_DELAY_MS:15000}
sunat.job.batch-size=${SUNAT_JOB_BATCH_SIZE:10}
sunat.job.max-retries=${SUNAT_JOB_MAX_RETRIES:10}
sunat.job.lock-minutes=${SUNAT_JOB_LOCK_MINUTES:10}

# Consulta de documentos SUNAT
external.sunat-consulta.base-url=${SUNAT_CONSULTA_BASE_URL:https://ww1.sunat.gob.pe/ol-ti-itfisdenreg/itfisdenreg.htm}
